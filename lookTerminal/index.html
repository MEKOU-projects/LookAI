<!DOCTYPE HTML>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        :root { background-color: transparent !important; }
        html, body {
            background: transparent !important;
            background-color: rgba(0, 0, 0, 0) !important;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #ui-container {
            /* コンテナ自体も背景を持たないように */
            background: transparent !important;
            width: 100%;
            height: 100%;
            color: #fff;
            pointer-events: none;
        }
        .hud {
            position: absolute;
            top: 20px; left: 20px;
            pointer-events: auto; /* ボタンなどはクリック可能 */
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="hud">
            <h1 style="color: red;">IOT DEBUG</h1>
            <div id="score">Score: 0</div>
        </div>
    </div>
</body>
</html>
