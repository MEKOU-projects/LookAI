<!DOCTYPE HTML>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            background: transparent !important; /* 絶対に透明 */
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        #ui-container {
            position: relative;
            width: 100%; height: 100%;
            color: #fff;
            pointer-events: none; /* UI以外の場所のクリックを親に通す */
        }
        .hud {
            position: absolute;
            top: 20px; left: 20px;
            pointer-events: auto; /* ボタンなどはクリック可能 */
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="hud">
            <h1 style="color: red;">IOT DEBUG</h1>
            <div id="score">Score: 0</div>
        </div>
    </div>
</body>
</html>
